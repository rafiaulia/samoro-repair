  <script>
    // Override Bootstrap dropdown untuk desktop hover
    (function () {
      function setupDropdownHover() {
        const dropdowns = document.querySelectorAll(".custom-dropdown");

        dropdowns.forEach(function (dropdown) {
          const toggle = dropdown.querySelector(".dropdown-toggle");
          const menu = dropdown.querySelector(".dropdown-menu");

          if (!toggle || !menu) return;

          // Hanya untuk desktop (>= 992px)
          if (window.innerWidth >= 992) {
            // 1. Hapus data-bs-toggle untuk prevent Bootstrap init
            toggle.removeAttribute("data-bs-toggle");

            // 2. Dispose Bootstrap dropdown instance jika sudah ada
            if (typeof bootstrap !== 'undefined' && bootstrap.Dropdown) {
              try {
                const dropdownInstance = bootstrap.Dropdown.getInstance(toggle);
                if (dropdownInstance) {
                  dropdownInstance.dispose();
                }
              } catch (e) {
                // Ignore error jika instance tidak ada
              }
            }

            // 3. Remove event listeners yang mungkin sudah ada dengan clone
            const originalToggle = toggle;
            const originalMenu = menu;

            // Setup hover behavior
            dropdown.addEventListener("mouseenter", function () {
              originalMenu.classList.add("show");
              originalMenu.style.display = "block";
              originalMenu.style.opacity = "1";
              originalMenu.style.visibility = "visible";
              originalMenu.style.transform = "translateY(0)";
              originalMenu.style.pointerEvents = "auto";
            });

            dropdown.addEventListener("mouseleave", function () {
              originalMenu.classList.remove("show");
              originalMenu.style.display = "";
              originalMenu.style.opacity = "";
              originalMenu.style.visibility = "";
              originalMenu.style.transform = "";
              originalMenu.style.pointerEvents = "";
            });
          } else {
            // Untuk mobile, pastikan Bootstrap bisa handle dengan click
            if (!toggle.hasAttribute("data-bs-toggle")) {
              toggle.setAttribute("data-bs-toggle", "dropdown");
            }
          }
        });
      }

      // Jalankan saat DOM ready
      if (document.readyState === 'loading') {
        document.addEventListener("DOMContentLoaded", function () {
          // Tunggu Bootstrap JS selesai load
          if (typeof bootstrap !== 'undefined') {
            setupDropdownHover();
          } else {
            // Jika Bootstrap belum load, tunggu dulu
            window.addEventListener('load', function () {
              setTimeout(setupDropdownHover, 100);
            });
          }
        });
      } else {
        // DOM sudah ready
        if (typeof bootstrap !== 'undefined') {
          setupDropdownHover();
        } else {
          window.addEventListener('load', function () {
            setTimeout(setupDropdownHover, 100);
          });
        }
      }

      // Re-init saat resize
      let resizeTimer;
      window.addEventListener("resize", function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          setupDropdownHover();
        }, 250);
      });
    })();
  </script>
